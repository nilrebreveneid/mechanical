    "explanation": "Herzberg को Two Factors Theory अनुसार 'जिम्मेवारी' उत्प्रेरक तत्व (Motivator) हो; सुपरिवेक्षण, तलब, कम्पनीको नीति Hygiene factors हुन्।"
  },
  {
    "q": "अङ्क अक्षर लेखाइ र पढाइसँग सम्बन्धित कम्प्युटर कुन प्रकारमा पर्छ?",
    "options": [
      "एनालग कम्प्युटर",
      "डिजिटल कम्प्युटर",
      "हाइब्रिड कम्प्युटर",
      "सुपर कम्प्युटर"
    ],
    "answer": 1,
    "explanation": "अङ्क, अक्षर लेखाइ र पढाइसँग सम्बन्धित कम्प्युटर 'डिजिटल कम्प्युटर' हो।"
  },
  {
    "q": "सञ्चारका तत्व/हरुमा तलका मध्ये कुन पर्दछ/पर्दछन् ?",
    "options": [
      "सूचना",
      "सूचना प्रापक",
      "प्रसार हुने प्रकिया",
      "माथिका सबै"
    ],
    "answer": 3,
    "explanation": "सञ्चारका तत्वहरूमा सूचना, सूचना प्रापक र प्रसार हुने प्रक्रिया — सबै पर्दछन्।"
  },
  {
    "q": "सार्वजनिक खरिद भन्नाले के बुझिन्छ ?",
    "options": [
      "वस्तु वा सेवा किन्ने",
      "भाडामा वा करारमा लिने",
      "निर्माण वा मर्मत संभार सम्बन्धी कार्य गर्ने वा गराउने",
      "माथिका सबै"
    ],
    "answer": 3,
    "explanation": "सार्वजनिक खरिद भन्नाले वस्तु किन्ने, सेवा लिने, भाडामा लिने र निर्माण/मर्मत गर्ने/गराउने सबै कुरा बुझिन्छ।"
  },
  {
    "q": "निजामती सेवा ऐन २०४९ मा जम्मा कति परिच्छेद र दफाहरु रहेका छन् ?",
    "options": [
      "८ परिच्छेद र ६० दफा",
      "९ परिच्छेद र ७० दफा",
      "१० परिच्छेद र ७६ दफा",
      "११ परिच्छेद र ८० दफा"
    ],
    "answer": 2,
    "explanation": "निजामती सेवा ऐन, २०४९ मा जम्मा १० परिच्छेद र ७६ दफाहरू रहेका छन्।"
  }
];

const questions = rawQuestions.map((item, idx) => {
  const opts = Array.isArray(item.options) ? item.options.map(o => String(o)) : [];
  const ai = Math.min(Number.isInteger(Number(item.answer)) && Number(item.answer) >= 0 ? Number(item.answer) : 0, Math.max(opts.length - 1, 0));
  return { q: String(item.q || item.question || `Q${idx+1}`), options: opts, answer: ai, explanation: String(item.explanation || 'No explanation.') };
}).filter(q => q.q && q.options.length > 0);

const quizEl = document.getElementById('quiz');
const scoreEl = document.getElementById('score');
const timerEl = document.getElementById('timer');
const progressEl = document.getElementById('progress');
const progressTextEl = document.getElementById('progress-text');
const currentScoreEl = document.getElementById('current-score');
const questionsAnsweredEl = document.getElementById('questions-answered');
const questionsTotalEl = document.getElementById('questions-total');
const accuracyEl = document.getElementById('accuracy');
const resultsEl = document.getElementById('results');
const resultsBody = document.getElementById('results-body');
const streakBadge = document.getElementById('streak-badge');
const restartBtn = document.getElementById('restart-btn');

let currentPage = 0, score = 0, timerSeconds = 0, timerInterval = null;
let currentStreak = 0, maxStreak = 0, quizFinished = false;
const itemsPerPage = Number(quizConfig.questionsPerPage) || 20;
const totalPages = Math.max(1, Math.ceil(questions.length / itemsPerPage));
let userAnswers = questions.map(() => null);

questionsTotalEl.textContent = questions.length;

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}
function formatTime(s) { return `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`; }
function startTimer() { clearInterval(timerInterval); timerInterval = setInterval(() => { timerSeconds++; timerEl.textContent = formatTime(timerSeconds); }, 1000); }

function updateStats() {
  const answered = userAnswers.filter(a => a !== null).length;
  const correct = userAnswers.filter(a => a && a.isCorrect).length;
  currentScoreEl.textContent = correct;
  questionsAnsweredEl.textContent = answered;
  accuracyEl.textContent = answered ? Math.round(correct/answered*100) + '%' : '0%';
  progressTextEl.textContent = `${answered}/${questions.length}`;
  progressEl.style.width = (questions.length ? answered/questions.length*100 : 0) + '%';
}

function updateStreak(ok) {
  if (ok) { currentStreak++; maxStreak = Math.max(maxStreak, currentStreak); if (currentStreak >= 3) { streakBadge.textContent = `Streak: ${currentStreak}`; streakBadge.classList.add('show'); setTimeout(() => streakBadge.classList.remove('show'), 1800); } }
  else currentStreak = 0;
}

function drawConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  const particles = Array.from({length:150}, () => ({
    x: Math.random()*canvas.width, y: Math.random()*canvas.height - canvas.height,
    vx: (Math.random()-0.5)*4, vy: Math.random()*3+2,
    color: ['#6366f1','#06b6d4','#f59e0b','#10b981','#ec4899'][Math.floor(Math.random()*5)],
    size: Math.random()*6+2, rotation: Math.random()*360
  }));
  let aid;
  function animate() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    let active = false;
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.rotation += 2;
      if (p.y < canvas.height+20) { active = true; ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rotation*Math.PI/180); ctx.fillStyle=p.color; ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size); ctx.restore(); }
    });
    if (active) aid = requestAnimationFrame(animate);
  }
  animate();
  setTimeout(() => cancelAnimationFrame(aid), 5000);
}

function renderPage() {
  if (quizFinished) return;
  quizEl.innerHTML = ''; scoreEl.textContent = ''; resultsEl.classList.add('hidden');
  const start = currentPage * itemsPerPage;
  const end = Math.min(questions.length, start + itemsPerPage);
  for (let qi = start; qi < end; qi++) {
    const question = questions[qi];
    const wrapper = document.createElement('div'); wrapper.className = 'question-wrapper';
    const card = document.createElement('div'); card.className = 'question-card'; card.dataset.index = qi;
    const hdr = document.createElement('div'); hdr.className = 'question-header';
    hdr.innerHTML = `<div class="question-number">${qi+1}</div><div class="question-text">${question.q}</div>`;
    const optsEl = document.createElement('div'); optsEl.className = 'options';
    const expEl = document.createElement('div'); expEl.className = 'explanation'; expEl.textContent = question.explanation;
    const shuffled = shuffle(question.options.map((t,i) => ({text:t,optionIndex:i})));
    shuffled.forEach((opt, di) => {
      const btn = document.createElement('button'); btn.className = 'option-btn';
      btn.innerHTML = `<span class="option-indicator">${String.fromCharCode(65+di)}</span><span>${opt.text}</span>`;
      btn.addEventListener('click', () => handleAnswer(qi, opt.optionIndex, opt.text, btn, optsEl, expEl));
      optsEl.appendChild(btn);
    });
    card.appendChild(hdr); card.appendChild(optsEl); card.appendChild(expEl);
    wrapper.appendChild(card); quizEl.appendChild(wrapper);
    const bar = document.createElement('div'); bar.className = 'action-bar';
    const skipBtn = document.createElement('button'); skipBtn.className = 'btn btn-skip'; skipBtn.innerHTML = '⊘ Skip Question';
    skipBtn.addEventListener('click', () => skipQuestion(qi, expEl, optsEl));
    bar.appendChild(skipBtn); quizEl.appendChild(bar);
  }

  const pager = document.createElement('div'); pager.style.display = 'flex'; pager.style.justifyContent = 'space-between'; pager.style.marginTop = '1rem';
  const left = document.createElement('div');
  const prevBtn = document.createElement('button'); prevBtn.className = 'btn'; prevBtn.textContent = '← Previous';
  prevBtn.disabled = currentPage === 0;
  prevBtn.addEventListener('click', () => { if (currentPage>0) { currentPage--; renderPage(); } });
  left.appendChild(prevBtn);
  const pageInfo = document.createElement('div'); pageInfo.style.alignSelf = 'center'; pageInfo.textContent = `Page ${currentPage+1} of ${totalPages}`;
  const right = document.createElement('div');
  const nextBtn = document.createElement('button'); nextBtn.className = 'btn'; nextBtn.textContent = 'Next →';
  nextBtn.disabled = currentPage >= totalPages-1;
  nextBtn.addEventListener('click', () => { if (currentPage < totalPages-1) { currentPage++; renderPage(); } });
  const finishBtn = document.createElement('button'); finishBtn.className = 'btn'; finishBtn.textContent = 'Finish Quiz'; finishBtn.style.marginLeft = '0.5rem';
  finishBtn.addEventListener('click', () => finishQuiz());
  right.appendChild(nextBtn); right.appendChild(finishBtn);
  pager.appendChild(left); pager.appendChild(pageInfo); pager.appendChild(right);
  quizEl.appendChild(pager);
}

function lockOptions(c) { c.querySelectorAll('.option-btn').forEach(b => b.disabled = true); }
function revealCorrect(c, ai, qi) { c.querySelectorAll('.option-btn').forEach(b => { if (b.querySelector('span:last-child').textContent === questions[qi].options[ai]) b.classList.add('correct'); }); }

function checkComplete() {
  if (userAnswers.every(a => a !== null)) finishQuiz();
}

function handleAnswer(qi, si, st, btn, opts, exp) {
  if (userAnswers[qi] !== null) return;
  const ok = si === questions[qi].answer;
  lockOptions(opts); revealCorrect(opts, questions[qi].answer, qi);
  btn.classList.add(ok ? 'correct' : 'wrong');
  if (ok) score++;
  exp.style.display = 'block';
  userAnswers[qi] = {selectedText: st, isCorrect: ok, skipped: false};
  updateStreak(ok); updateStats(); checkComplete();
}

function skipQuestion(qi, exp, opts) {
  if (userAnswers[qi] !== null) return;
  lockOptions(opts); exp.style.display = 'block';
  userAnswers[qi] = {selectedText: 'Skipped', isCorrect: false, skipped: true};
  updateStreak(false); updateStats(); checkComplete();
}

function finishQuiz() {
  quizFinished = true; clearInterval(timerInterval); quizEl.innerHTML = '';
  const pct = questions.length ? (score/questions.length*100).toFixed(1) : '0.0';
  let msg = "Keep learning! You'll improve!", emoji = '📚';
  if (Number(pct) >= 90) { msg = "Outstanding! You're a master!"; emoji = '🏆'; drawConfetti(); }
  else if (Number(pct) >= 70) { msg = 'Great job! Well done!'; emoji = '🌟'; }
  else if (Number(pct) >= 50) { msg = 'Good effort! Keep practicing!'; emoji = '💪'; }
  scoreEl.innerHTML = `<div style="font-size:4rem;margin-bottom:1rem">${emoji}</div><div class="score-display">${pct}%</div><div class="score-label">${msg}</div><div style="margin-top:1rem;color:var(--text-secondary)">${score} correct out of ${questions.length} questions<br>Time: ${formatTime(timerSeconds)} | Best Streak: ${maxStreak}</div>`;
  resultsBody.innerHTML = questions.map((q, i) => {
    const a = userAnswers[i];
    const ua = !a ? 'Not attempted' : a.skipped ? 'Skipped' : a.selectedText;
    const st = !a ? 'Not attempted' : a.skipped ? 'Skipped' : a.isCorrect ? 'Correct' : 'Wrong';
    const sc = st.toLowerCase().replace(' ', '-');
    const si = st === 'Correct' ? '✓' : st === 'Wrong' ? '✗' : st === 'Skipped' ? '⊘' : '•';
    return `<tr><td>${i+1}</td><td>${q.q}</td><td>${ua}</td><td>${q.options[q.answer]||''}</td><td><span class="status-badge status-${sc}">${si} ${st}</span></td><td class="explanation-cell">${q.explanation}</td></tr>`;
  }).join('');
  resultsEl.classList.remove('hidden');
}

function restartQuiz() {
  if (pendingTimeout) { clearTimeout(pendingTimeout); pendingTimeout = null; }
  clearInterval(timerInterval);
  currentIndex = 0; score = 0; timerSeconds = 0; currentStreak = 0; maxStreak = 0; quizFinished = false;
  userAnswers = questions.map(() => null);
  timerEl.textContent = '00:00'; streakBadge.classList.remove('show');
  updateStats(); renderQuestion(); startTimer();
}

restartBtn.addEventListener('click', restartQuiz);
window.addEventListener('resize', () => { const c = document.getElementById('confetti-canvas'); if (c) { c.width = window.innerWidth; c.height = window.innerHeight; } });
updateStats(); renderPage(); startTimer();
    </script>
</body>
